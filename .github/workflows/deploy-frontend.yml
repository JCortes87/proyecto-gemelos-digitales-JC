# ----------------------------------------------------------------------------
# Workflow de deploy automatico del frontend a S3 + CloudFront.
#
# Se dispara cuando:
#   - Hay un push a la rama main que cambia algo en gemelo-digital-frontend/
#     o en el propio archivo del workflow.
#   - Se ejecuta manualmente desde la pestana Actions de GitHub.
#
# Lo que hace:
#   1. Checkout del codigo.
#   2. Instala Node.js y las dependencias de npm.
#   3. Corre `npm run build` (que usa .env.production con la URL del backend).
#   4. Asume el rol IAM en AWS via OIDC.
#   5. Sincroniza la carpeta dist/ al bucket S3 (con --delete para limpiar
#      archivos viejos que ya no existen en el build).
#   6. Invalida toda la cache de CloudFront para que los usuarios vean el
#      cambio de inmediato.
# ----------------------------------------------------------------------------
name: Deploy frontend a S3 y CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'gemelo-digital-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Garantiza que no haya dos deploys del frontend corriendo al tiempo.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

# Permisos requeridos para que GitHub Actions pueda solicitar el token OIDC.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '718624265053'
  S3_BUCKET: gemelo-frontend-prod
  CLOUDFRONT_DISTRIBUTION_ID: E32WDBCT7SFCRD
  IAM_ROLE_ARN: arn:aws:iam::718624265053:role/GemeloDigitalDeployerRole

jobs:
  deploy:
    name: Construir SPA y subir a S3 + invalidar CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gemelo-digital-frontend/gemelo-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: gemelo-digital-frontend/gemelo-frontend
        run: npm ci

      - name: Construir la SPA
        working-directory: gemelo-digital-frontend/gemelo-frontend
        run: npm run build

      - name: Configurar credenciales AWS (via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-frontend

      - name: Sincronizar dist a S3
        working-directory: gemelo-digital-frontend/gemelo-frontend
        run: |
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidar cache de CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation creada: $INVALIDATION_ID"

      - name: Resumen del deploy
        run: |
          echo "Frontend desplegado correctamente."
          echo "Bucket: s3://${{ env.S3_BUCKET }}"
          echo "CloudFront distribution: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "Disponible en: https://gemelo.cesa.edu.co"
